plugins {
    id 'eclipse'
    id 'idea'
    id 'net.minecraftforge.gradle' version '[6.0.16,6.2)'
}


group = mod_group_id
version = mod_version

base {
    archivesName = mod_id
}

java {
    toolchain.languageVersion = JavaLanguageVersion.of(17)
}

minecraft {
    mappings channel: mapping_channel, version: mapping_version
    accessTransformer = file('src/main/resources/META-INF/accesstransformer.cfg')
    copyIdeResources = true

    runs {
        configureEach {
            workingDirectory project.file('run')

            property 'forge.logging.markers', 'REGISTRIES'

            property 'forge.logging.console.level', 'debug'

            mods {
                "${mod_id}" {
                    source sourceSets.main
                }
            }
        }

        client {
            property 'forge.enabledGameTestNamespaces', mod_id
        }

        server {
            property 'forge.enabledGameTestNamespaces', mod_id
            args '--nogui'
        }

        gameTestServer {
            property 'forge.enabledGameTestNamespaces', mod_id
        }

        data {
            workingDirectory project.file('run-data')

            args '--mod', mod_id, '--all', '--output', file('src/generated/resources/'), '--existing', file('src/main/resources/')
        }
    }
}

sourceSets.main.resources { srcDir 'src/generated/resources' }

repositories {

}

dependencies {
    minecraft "net.minecraftforge:forge:${minecraft_version}-${forge_version}"

    compileOnly("org.projectlombok:lombok:1.18.42")
    annotationProcessor("org.projectlombok:lombok:1.18.42")

    testCompileOnly("org.projectlombok:lombok:1.18.42")
    testAnnotationProcessor("org.projectlombok:lombok:1.18.42")

}

tasks.named('processResources', ProcessResources).configure {
    var replaceProperties = [minecraft_version   : minecraft_version, minecraft_version_range: minecraft_version_range,
                             forge_version       : forge_version, forge_version_range: forge_version_range,
                             loader_version_range: loader_version_range,
                             mod_id              : mod_id, mod_name: mod_name, mod_license: mod_license, mod_version: mod_version,
                             mod_authors         : mod_authors, mod_description: mod_description,]

    inputs.properties replaceProperties

    filesMatching(['META-INF/mods.toml', 'pack.mcmeta']) {
        expand replaceProperties + [project: project]
    }
}

// Example for how to get properties into the manifest for reading at runtime.
tasks.named('jar', Jar).configure {
    manifest {
        attributes(["Specification-Title"     : mod_id,
                    "Specification-Vendor"    : mod_authors,
                    "Specification-Version"   : "1", // We are version 1 of ourselves
                    "Implementation-Title"    : project.name,
                    "Implementation-Version"  : project.jar.archiveVersion,
                    "Implementation-Vendor"   : mod_authors,
                    "Implementation-Timestamp": new Date().format("yyyy-MM-dd'T'HH:mm:ssZ")])
    }

    finalizedBy 'reobfJar'
}

def devTransformationServiceModuleName = 'seraphina.lib.dev.transform.service'

def generateDevTransformationServiceModuleInfo = tasks.register('generateDevTransformationServiceModuleInfo') {
    def moduleInfoFile = layout.buildDirectory.file('generated/sources/devTransformationServiceModuleInfo/module-info.java')

    outputs.file(moduleInfoFile)

    doLast {
        def file = moduleInfoFile.get().asFile
        file.parentFile.mkdirs()
        file.text = """module ${devTransformationServiceModuleName} {
    requires cpw.mods.modlauncher;
    requires cpw.mods.securejarhandler;
    requires fmlloader;
    requires java.instrument;
    requires jdk.attach;
    requires jdk.unsupported;
    requires org.apache.commons.compress;
    requires org.objectweb.asm;
    requires org.objectweb.asm.commons;
    requires org.objectweb.asm.tree;

    uses seraphina.seraphina_lib.service.ISeraMixin;

    provides cpw.mods.modlauncher.api.ITransformationService
        with seraphina.seraphina_lib.mixin.service.SeraMixinTransformationService;
    provides seraphina.seraphina_lib.service.ISeraMixin
        with seraphina.seraphina_lib.mod.SeraLibMixin;
}
"""
    }
}

def compileDevTransformationServiceModuleInfo = tasks.register('compileDevTransformationServiceModuleInfo', JavaCompile) {
    dependsOn classes, generateDevTransformationServiceModuleInfo
    source generateDevTransformationServiceModuleInfo.map { it.outputs.files }
    destinationDirectory = layout.buildDirectory.dir('classes/java/devTransformationServiceModuleInfo')
    classpath = files()

    doFirst {
        def modulePath = files(sourceSets.main.compileClasspath, sourceSets.main.runtimeClasspath)
                .filter { it.isFile() && it.name.endsWith('.jar') }
        options.compilerArgs = [
                '--module-path', modulePath.asPath,
                '--patch-module', "${devTransformationServiceModuleName}=${sourceSets.main.output.asPath}"
        ]
    }
}

def devTransformationServiceJar = tasks.register('devTransformationServiceJar', Jar) {
    dependsOn compileDevTransformationServiceModuleInfo
    archiveClassifier = 'dev-transform-service'
    from sourceSets.main.output
    from compileDevTransformationServiceModuleInfo.map { it.destinationDirectory }

    // runClient supplies this project as exploded mod classes. This jar exists
    // only so ModLauncher can discover META-INF/services before FML scans mods.
    exclude 'META-INF/mods.toml', 'pack.mcmeta'

    manifest {
        attributes(["FMLModType": "LIBRARY"])
    }
}

def installDevTransformationServiceJar = tasks.register('installDevTransformationServiceJar', Copy) {
    dependsOn devTransformationServiceJar
    from devTransformationServiceJar.flatMap { it.archiveFile }
    into layout.projectDirectory.dir('run/mods')
    rename { "${mod_id}-dev-transform-service.jar" }
    doFirst {
        delete file("run/mods/${mod_id}-dev-transform-service.jar")
    }
}

tasks.withType(JavaExec).configureEach {
    if (name == 'runClient') {
        dependsOn installDevTransformationServiceJar
    }
}

tasks.withType(JavaCompile).configureEach {
    options.encoding = 'UTF-8'
}

def javaCompileModuleExports = [
        'java.base/java.lang.invoke',
        'java.base/jdk.internal.misc',
        'java.base/jdk.internal.reflect',
        'java.base/jdk.internal.loader',
        'java.base/jdk.internal.module',
        'jdk.attach/sun.tools.attach',
        'jdk.attach/com.sun.tools.attach',
        'jdk.attach/com.sun.tools.attach.spi',
        'java.instrument/sun.instrument',
        'java.base/java.lang.reflect',
        'java.base/java.lang'
]

tasks.withType(JavaCompile).configureEach {
    options.encoding = 'UTF-8'
    options.compilerArgs += javaCompileModuleExports.collectMany { modulePackage ->
        ['--add-exports', "${modulePackage}=ALL-UNNAMED"]
    }
}
